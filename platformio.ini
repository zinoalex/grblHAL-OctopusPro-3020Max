# PlatformIO Project Configuration File
# ===============================================================================
# grblHAL firmware build configuration
# Target : BIGTREETECH Octopus Pro v1.1 (STM32H723ZET6)
# Machine: Genmitsu 3020 Pro Max V2  (CNC milling, PCB routing, laser-ready)
# Author : zinoalex
# Upstream: dresco/STM32H7xx (https://github.com/dresco/STM32H7xx)
# ===============================================================================
#
# Quick build (from repo root):
#   pio run -e octopus_pro_3020max
#
# Firmware binary output:
#   .pio/build/octopus_pro_3020max/firmware.bin
#
# Flash via SD card (recommended):
#   1. Format a microSD (<=32 GB) as FAT32 with the official SD Formatter:
#      https://www.sdcard.org/downloads/formatter/
#   2. Copy firmware.bin to the SD root (no subfolders, exact filename)
#   3. Power off the board
#   4. Insert SD into the Octopus Pro TF slot
#   5. Power on and wait ~10 s (status LED blinks during flash)
#   6. Power off, remove SD, power back on
#   7. Success: firmware.bin will have been renamed to FIRMWARE.CUR on the SD
#
# Flash via DFU (USB-C) - only if SD method is unavailable:
#   1. Power off the main supply
#   2. Insert the MCU Power jumper near the USB-C connector
#   3. Hold BOOT0, press+release RESET, release BOOT0
#   4. Run: pio run -e octopus_pro_3020max -t upload
#   5. Remove the MCU Power jumper after flashing
#   WARNING: DFU overwrites the bootloader; you will lose SD-card flashing
#            capability unless you re-flash the BTT 128 KB bootloader afterwards.
#
# ===============================================================================

[platformio]
include_dir = Inc
src_dir = Src
board_dir = pio_boards

# -------------------------------------------------------------------------------
# Common build settings (apply to all environments)
# -------------------------------------------------------------------------------
[common]
build_flags =
  -I .
  -I boards
  # Enable L1 data/instruction cache with maintenance functions (H7 requirement)
  -D L1_CACHE_ENABLE=1
  # Floating-point support for printf/scanf
  -Wl,-u,_printf_float
  -Wl,-u,_scanf_float
  # Place ISR handlers in ITCM RAM for deterministic step-pulse timing
  '-D ISR_CODE=__attribute__((section(".itcmram")))'
  # NOTE: OVERRIDE_MY_MACHINE is intentionally absent here.
  # This allows Inc/my_machine.h to be read by the build system.
  # Do NOT add -D OVERRIDE_MY_MACHINE unless you want my_machine.h ignored.
lib_deps =
  grbl
  boards
  plugins
lib_extra_dirs =
  .

[common_h723]
lib_deps = Startup723
           ${common.lib_deps}

# -------------------------------------------------------------------------------
# SD card support (required for WebUI file serving and G-code upload)
# -------------------------------------------------------------------------------
[sdcard]
build_flags =
  -D SDCARD_ENABLE=1
  -I Middlewares/Third_Party/FatFs/src
  -I FATFS/Target
  -I FATFS/App
lib_deps =
  sdcard
  FATFS/App
  FATFS/Target
  Middlewares/Third_Party/FatFs

# -------------------------------------------------------------------------------
# USB CDC for H723 (USB-C virtual serial port -> ioSender / terminal)
# Note: the STM32H723 has no full-speed USB peripheral; the high-speed
# peripheral is configured to run in full-speed mode instead.
# -------------------------------------------------------------------------------
[usb_h723]
build_flags =
  -D USB_SERIAL_CDC=1
  -I Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc
  -I Middlewares/ST/STM32_USB_Device_Library/Core/Inc
  -I USB_DEVICE_H723/Target
  -I USB_DEVICE_H723/App
lib_deps =
  USB_DEVICE_H723/App
  USB_DEVICE_H723/Target
  Middlewares/ST/STM32_USB_Device_Library/Class
  Middlewares/ST/STM32_USB_Device_Library/Core

# -------------------------------------------------------------------------------
# Platform / framework defaults (shared by all [env:] sections)
# -------------------------------------------------------------------------------
[env]
platform = ststm32
platform_packages = framework-stm32cubeh7 @ 1.12.1
framework = stm32cube
lib_archive = no        # keep symbols visible for weak-symbol overrides
lib_ldf_mode = off

# ===============================================================================
# PRIMARY BUILD TARGET
# Name   : octopus_pro_3020max
# Board  : BTT Octopus Pro v1.1 — STM32H723ZET6 @ 550 MHz, 25 MHz XTAL
# Drivers: TMC2209 in UART mode on MOTOR0 (X), MOTOR1 (Y), MOTOR2 (Z)
# Spindle: 48 V DC brushed, ON/OFF only, controlled via SSR-40DD on FAN4 (PD14)
# Limits : Mechanical microswitches on STOP0/1/2 (PG6/PG9/PG10), NO wiring
# Probe  : Continuity tool-setter on STOP5 (PG13), opto-isolated, 12 V tolerant
# WebUI  : Wemos D1 Mini running ESP3D on USART3 — TX=PD8, RX=PD9, 115200 baud
# Console: USB-C -> ioSender (Windows) at 115200 baud
# Flash  : BTT 128 KB bootloader — SD-card update preferred
# ===============================================================================
[env:octopus_pro_3020max]
board = generic_stm32h723ze
board_build.ldscript = STM32H723ZETX_FLASH_BL.ld
build_flags =
  ${common.build_flags}
  ${sdcard.build_flags}
  ${usb_h723.build_flags}
  # Board selection — must match the board map in boards/btt_octopus_pro_map.h
  -D BOARD_BTT_OCTOPUS_PRO
  -D HSE_VALUE=25000000
  # Trinamic driver family — single-wire UART mode
  -D TRINAMIC_ENABLE=2209
  # Non-volatile settings storage emulated in internal flash (no external EEPROM)
  -D EEPROM_ENABLE=32
  # All other feature flags (WEBUI_ENABLE, SERIAL2_ENABLE, SDCARD_ENABLE, etc.)
  # are read from Inc/my_machine.h because OVERRIDE_MY_MACHINE is not set above.
lib_deps =
  ${common_h723.lib_deps}
  ${usb_h723.lib_deps}
  ${sdcard.lib_deps}
  motors
  trinamic
  eeprom
  webui
  fans
  networking
lib_extra_dirs =
  ${common.lib_extra_dirs}
upload_protocol = dfu
