name: PlatformIO build

on:
  push:
    branches:
      - master
      - ci_test
  workflow_dispatch: # Permette di avviare l'azione anche manualmente da GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out panel plugin
        uses: actions/checkout@v4
        with:
          repository: dresco/Plugin_panel
          path: ./panel

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        # Compila solo l'ambiente specifico per la tua Octopus Pro per evitare errori e velocizzare
        run: pio run -e octopus_pro_3020max

      - name: Archive firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            .pio/build/**/*.bin
            .pio/build/**/*.hex
            .pio/build/**/*.elf
